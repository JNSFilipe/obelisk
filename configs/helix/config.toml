theme = "carbonfox"

[editor]
default-yank-register = "+"
line-number = "relative"
mouse = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "block"

[editor.file-picker]
hidden = false

[keys.normal]
w = "@miw"
"C-q" = "wclose"

# LEADER KEYMAPS
[keys.normal.space]
F = "no_op" # Disable
E = "no_op" # Disable
e = "no_op" # Disable
P = "no_op" # Disable
R = "no_op" # Disable
C = "no_op" # Disable
D = "no_op" # Disable
Y = "no_op" # Disable
y = "no_op" # Disable
"?" = "no_op" # Disable
"/" = "no_op" # Disable
"A-c" = "no_op" # Disable
s = ":vsplit"    # Split the window vertically
S = ":hsplit"    # Split the window horizontally
i = "symbol_picker"
I = "workspace_symbol_picker"
p = "global_search" # Disable
d = "workspace_diagnostics_picker"
w = ":w" # Window mode can be accessed with C-w, vim style
o = [ # Yazi
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
] # https://github.com/helix-editor/helix/discussions/12934
"space" = "command_palette"
 

#####################################################################################
####################################### EMACS #######################################
#####################################################################################
[keys.insert]
# NONE-EMACS
"C-q" = "wclose"
"C-g" = "normal_mode"     # Maps Crtl-g to exit insert mode
j = { j = "normal_mode" } # Maps `jj` to exit insert mode

# --- Navigation (Movement) ---
"C-a" = "goto_line_start"        # Move to beginning of line
"C-e" = "goto_line_end"          # Move to end of line
"C-f" = "move_char_right"        # Forward one character
"C-b" = "move_char_left"         # Backward one character
"C-n" = "move_line_down"         # Next line
"C-p" = "move_line_up"           # Previous line
"A-f" = "move_next_word_start"   # Forward one word
"A-b" = "move_prev_word_start"     # Backward one word
"A-v" = "page_up"                # Page up
"C-v" = "page_down"              # Page down
"A-<" = "goto_file_start"        # Top of file
"A->" = "goto_file_end"          # End of file
"C-l" = "align_view_center"      # Recenter screen
"2" = "hsplit"    # Emacs split-window-below
"3" = "vsplit"    # Emacs split-window-right
"0" = "wclose"     # Emacs delete-window (Close current split)
"1" = "wonly"     # Emacs delete-other-windows (Close all splits except current)

# --- Selection / Mark Mode ---
# Note: Helix selections are active by default. 
# These "S-" (Shift) binds allow you to "set mark" and move.
"C-space" = "select_mode"        # Enter selection mode
"S-C-f" = "extend_char_right"    # Select forward
"S-C-b" = "extend_char_left"     # Select backward
"S-C-n" = "extend_line_down"     # Select next line
"S-C-p" = "extend_line_up"       # Select previous line
"S-A-f" = "extend_next_word_start" # Select word forward
"S-A-b" = "extend_prev_word_start" # Select word backward

# --- Deletion & Killing (Yanking) ---
"C-d" = "delete_char_forward"    # Delete forward
"C-h" = "delete_char_backward"   # Backspace
"A-d" = "delete_word_forward"    # Kill word forward
"C-w" = "delete_word_backward"   # Kill word backward
"A-backspace" = "delete_word_backward" 
"C-k" = "kill_to_line_end"       # Kill to end of line
"C-y" = "paste_before"           # Yank (Paste)
"C-u" = "kill_to_line_start"     # Kill to start of line (Unix style)

# --- Editing & Utilities ---
"C-o" = "open_below"             # Opens a new line below the current one
"C-j" = "insert_newline"         # Splits the current line at the cursor (Standard Enter)
"C-/" = "undo"                   # Undo
"C-_" = "undo"                   # Undo (Alternate)
"C-s" = "search"                 # I-search (triggers search mode)

# --- The C-x Menu (Emacs Chords) ---
[keys.normal.C-x]
"C-f" = "file_explorer"         # Open explorer at root
"C-b" = "buffer_picker"         # List open buffers
"C-s" = ":w"                    # Save (Write)
"C-c" = ":q"                    # Quit
"k"   = ":bc"                   # Kill buffer (Close)
"u"   = "undo"                  # Undo (Emacs uses C-x u)
"h"   = "select_all"            # Select entire buffer
[keys.insert.C-x]
"C-f" = "file_explorer"         # Open explorer at root
"C-b" = "buffer_picker"         # List open buffers
"C-s" = ":w"                    # Save (Write)
"C-c" = ":q"                    # Quit
"k"   = ":bc"                   # Kill buffer (Close)
"u"   = "undo"                  # Undo (Emacs uses C-x u)
"h"   = "select_all"            # Select entire buffer
